version: '3.8'
services:
  db:
    image: postgres:16
    container_name: match-carreira-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: match_carreira_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: match-carreira-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
