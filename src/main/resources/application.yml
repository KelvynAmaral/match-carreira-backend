spring:
  application:
    name: match-carreira-api

  # --- CONFIGURACAO DE E-MAIL (MAILTRAP) ---
  mail:
    host: sandbox.smtp.mailtrap.io
    port: 2525
    username: bacd2d9b4454f9
    password: 03892fe19ad78f
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # --- CONFIGURACAO DO BANCO DE DADOS ---
  datasource:
    url: jdbc:postgresql://localhost:5432/match_carreira_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  # --- CONFIGURACAO DO JPA / HIBERNATE ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  # --- CACHE (REDIS) ---
  data:
    redis:
      host: localhost
      port: 6379

# --- CONFIGURACAO DO SWAGGER (SPRINGDOC) ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

# --- SEGURANCA CUSTOMIZADA ---
api:
  security:
    token:
      secret: ${JWT_SECRET:match-carreira-secret-key-32-chars-minimum}

# --- LOGGING ---
logging:
  level:
    org.hibernate.SQL: DEBUG