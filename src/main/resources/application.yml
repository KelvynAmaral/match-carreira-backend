spring:
  application:
    name: match-carreira-api
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:seu_user}
    password: ${MAIL_PASSWORD:sua_senha}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/match_carreira_db
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver
  flyway:
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    baseline-on-migrate: true
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
springdoc:
  swagger-ui:
    path: /swagger-ui.html
api:
  security:
    token:
      secret: ${JWT_SECRET:match-carreira-secret-key-com-pelo-menos-32-caracteres}
      expiration-hours: 24