spring:
  application:
    name: match-carreira-api

  # --- CONFIGURACAO DE E-MAIL (MAILTRAP) ---
  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USERNAME:seu_user_fake}
    password: ${MAIL_PASSWORD:sua_senha_fake}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

  # --- CONFIGURACAO DO BANCO DE DADOS (POSTGRESQL) ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/match_carreira_db
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver
    # Pool de conexões otimizado
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  # --- CONFIGURACAO DO JPA / HIBERNATE ---
  jpa:
    hibernate:
      # 'update' para desenvolvimento (ajusta tabelas automaticamente)
      # 'validate' ou 'none' para produção
      ddl-auto: ${JPA_DDL:update}
    show-sql: ${SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Converte CamelCase (Java) para snake_case (Postgres)
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  # --- CACHE E SESSÃO (REDIS) ---
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      #password: ${REDIS_PASSWORD:} # Se necessário futuramente
  cache:
    type: redis

# --- CONFIGURACAO DO SWAGGER (SPRINGDOC) ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

# --- SEGURANCA CUSTOMIZADA (JWT) ---
# Essencial para o fluxo 'Sem Estado' que você definiu
api:
  security:
    token:
      secret: ${JWT_SECRET:match-carreira-secret-key-com-pelo-menos-32-caracteres}
      expiration-hours: ${JWT_EXPIRATION:24}

# --- LOGGING ---
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: ${LOG_SQL_LEVEL:INFO}