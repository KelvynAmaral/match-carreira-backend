spring:
  application:
    name: match-carreira-api

  datasource:
    url: jdbc:postgresql://localhost:5432/match_carreira_db
    username: admin
    password: password123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Gera tabelas automaticamente
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

  data:
    redis:
      host: localhost
      port: 6379

# Configuracao de seguranca customizada
api:
  security:
    token:
      secret: ${JWT_SECRET:match-carreira-secret-key-32-chars-minimum}

logging:
  level:
    org.hibernate.SQL: DEBUG